<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="index.js"></script>
    <title>Bernáth Milán</title>
  </head>
  <body>
    <main>
      <header>
        <h1>Híres sakkozók</h1>
      </header>

      <article>
        <table border="1">
          <thead>
            <tr>
              <th>Név <button id="nevAZ">⬆️</button><button id="nevZA">⬇️</button></th>
              <th>Nemzetiség <button id="nemzNo">⬆️</button><button id="nemzCsokk">⬇️</button></th>
              <th>Győzelmek száma <button id="gyozelemCsokk">⬆️</button><button id="gyozelemNo">⬇️</button></th>
            </tr>
          </thead>
          <tbody id="tbody">

          </tbody>
        </table>
      </article>

      <section>
        <h2>Sakktábla pozíciók</h2>
        <div>
          <label for="pozicio1">1. pozíció:</label>
          <input
            type="text"
            id="pozicio1"
            name="pozicio1"
            placeholder="pl. e4"
          />
        </div>
        <div>
          <label for="pozicio2">2. pozíció:</label>
          <input
            type="text"
            id="pozicio2"
            name="pozicio2"
            placeholder="pl. d5"
          />
        </div>
        <button id="gomb">OK</button>
      </section>

      <footer>
        <p>&copy; Bernáth Milán</p>
      </footer>
    </main>
  </body>
</html>
